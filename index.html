<style>
:root {
  --w: #FFF;
  --bk: #1A1A1A;
  --g2: #EEE;
  --g5: #595959;
  --ss: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", sans-serif;
}
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
}
body {
  font-family: var(--ss);
  background: #000;
  color: var(--bk);
  line-height: 1.6;
  overflow-x: hidden;
  padding-bottom: 96px; /* 常設CTAとコンテンツ被り防止用の底面余白 */
}
img {
  max-width: 100%;
  height: auto;
  display: block;
}
/* ===== Stories Carousel ===== */
.stry {
  position: relative;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: #000;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}
.stry-viewport {
  position: relative;
  width: 100%;
  aspect-ratio: 9/16;
  cursor: pointer;
}
.stry-slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  will-change: opacity;
}
.stry-slide.act {
  opacity: 1;
  pointer-events: auto;
}
.stry-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
/* Progress bars */
.stry-bars {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 3px;
  padding: 10px 8px 0;
  z-index: 10;
}
.stry-seg {
  flex: 1;
  height: 2px;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 1px;
  overflow: hidden;
}
.stry-fill {
  width: 0%;
  height: 100%;
  background: #fff;
  border-radius: 1px;
  will-change: width;
}
.stry-seg.done .stry-fill {
  width: 100% !important;
  transition: none;
}
.stry-seg.active .stry-fill {
  transition: width linear;
}
/* ===== Stories Counter ===== */
.stry-counter {
  position: absolute;
  top: 24px;
  right: 16px;
  z-index: 11;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--ss);
  padding: 4px 10px;
  border-radius: 12px;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.stry-counter.vis {
  opacity: 1;
}
/* ===== Sticky CTA ===== */
.stry-sticky-cta {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  z-index: 999;
  background: rgba(255, 255, 255, 0.97);
  border-top: .5px solid var(--g2);
  box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.06);
  padding: 16px 20px calc(16px + env(safe-area-inset-bottom, 0px));
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  /* 初期状態（最後のページ以外）は非表示にするための設定を追加 */
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
/* 最後のページで付与するアクティブ用のクラスを追加 */
.stry-sticky-cta.act {
  opacity: 1;
  pointer-events: auto;
}
.stry-sticky-btn {
  display: block;
  width: 100%;
  padding: 16px;
  background: var(--bk);
  color: #fff;
  text-align: center;
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.1em;
  border-radius: 30px;
  text-transform: uppercase;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease;
  position: relative;
  overflow: hidden;
}
.stry-sticky-btn::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
  animation: shine 3s infinite;
}
.stry-sticky-btn:hover {
  transform: scale(1.02);
  opacity: 0.95;
}
.stry-sticky-btn:active {
  transform: scale(0.98);
}
@keyframes shine {
  0% { left: -100%; }
  25% { left: 150%; }
  100% { left: 150%; }
}

      var currentHref = ctaLinkEl.getAttribute('href');

        var separator = currentHref.indexOf('?') !== -1 ? '&' : '?';
        ctaLinkEl.setAttribute('href', currentHref + separator + 'test=' + rawParam);

  })();

  /* ===== GA4 高度なイベント計測処理（ChatGPT推奨の設計） ===== */

  if (typeof gtag === 'function') {

  // 2. スライド閲覧イベント

  function trackSlideView(slideIndex) {
    // スライドがめくられた瞬間に、その場でURLパラメータを直接取得（迷子防止）
    var currentParams = new URLSearchParams(window.location.search);

  // 3. CTAクリックイベントの設定

  var ctaLinkEl = document.getElementById('stry-cta-link');
  if (ctaLinkEl) {

      var currentParams = new URLSearchParams(window.location.search);

      console.log('CTA CLICK START - type:', clickLpType);

      // GA4へのデータ送信

  /* ===== Stories Carousel 制御ロジック ===== */
  var DURATION = 5000;
  var slides = document.querySelectorAll('.stry-slide');

  var total = slides.length;

  function checkCtaVisibility() {
    if (!stickyCtaEl) return;
    if (cur === total - 1) {
      stickyCtaEl.classList.add('act');
    } else {
      stickyCtaEl.classList.remove('act');

  }

  function showCounter() {
    if (!counterEl) return;
    counterEl.textContent = (cur + 1) + ' / ' + total;
    counterEl.classList.add('vis');

  function goTo(n) {
    slides[cur].classList.remove('act');
    segs[cur].classList.remove('active');
    segs[cur].classList.add('done');
    segs[cur].querySelector('.stry-fill').style.width = '100%';
    cur = n;
    if (cur >= total) { cur = 0; resetAllBars(); }
    if (cur < 0) cur = total - 1;
    for (var i = 0; i < total; i++) {
      if (i < cur) { segs[i].classList.add('done'); segs[i].classList.remove('active'); segs[i].querySelector('.stry-fill').style.width = '100%'; }
      else if (i > cur) { segs[i].classList.remove('done','active'); segs[i].querySelector('.stry-fill').style.width = '0%'; }
    }
    slides[cur].classList.add('act');
    segs[cur].classList.remove('done');
    segs[cur].classList.add('active');
    elapsed = 0;
    startFill();
    showCounter();
    checkCtaVisibility();
    trackSlideView(cur + 1);
  }

  function resetAllBars() {
    for (var i = 0; i < total; i++) {
      segs[i].classList.remove('done','active');
      segs[i].querySelector('.stry-fill').style.width = '0%';
      segs[i].querySelector('.stry-fill').style.transition = 'none';
    }
  }

  function startFill() {
    clearTimeout(timer);
    var fill = segs[cur].querySelector('.stry-fill');
    var remain = DURATION - elapsed;
    fill.style.transition = 'none';
    fill.style.width = (elapsed / DURATION * 100) + '%';
    void fill.offsetWidth;
    fill.style.transition = 'width ' + remain + 'ms linear';
    fill.style.width = '100%';
    startTime = Date.now();
    timer = setTimeout(function() { goTo(cur + 1); }, remain);
  }

  function pauseStory() {
    if (paused) return;
    paused = true;
    clearTimeout(timer);
    elapsed += Date.now() - startTime;
    var fill = segs[cur].querySelector('.stry-fill');
    var computed = getComputedStyle(fill).width;
    fill.style.transition = 'none';
    fill.style.width = computed;
  }

  function resumeStory() {
    if (!paused) return;
    paused = false;
    startFill();
  }

  var startX = 0, startY = 0;
  var isSwipeAction = false;
  var preventClick = false;
  var vp = document.getElementById('stry-vp');

  function handleTap(clientX) {
    if (!vp) return;
    var rect = vp.getBoundingClientRect();
    var x = clientX - rect.left;
    var width = rect.width;
    var ratio = x / width;
    if (ratio < 0.3) {
      goTo(cur - 1);
    } else {
      goTo(cur + 1);
    }
  }

  vp.addEventListener('click', function(e) {
    e.preventDefault();
    if (preventClick) return;
    handleTap(e.clientX);
  });

  vp.addEventListener('touchstart', function(e) {

  vp.addEventListener('touchmove', function(e) {

      isSwipeAction = true;
      clearTimeout(holdTimer);
      pauseStory();
      if (e.cancelable) e.preventDefault();
    }
  }, {passive:false});

  vp.addEventListener('touchend', function(e) {
    clearTimeout(holdTimer);
    if (isSwipeAction) {
      var touch = e.changedTouches[0];
      var diffX = touch.clientX - startX;
      if (diffX < -50) {
        goTo(cur + 1);
      } else if (diffX > 50) {
        goTo(cur - 1);
      } else {
        resumeStory();
      }
      preventClick = true;
      setTimeout(function() { preventClick = false; }, 300);
    } else {
      resumeStory();
      var touch = e.changedTouches[0];
      handleTap(touch.clientX);
      preventClick = true;
      setTimeout(function() { preventClick = false; }, 300);
    }
  }, {passive:true});

  vp.addEventListener('touchcancel', function() {
    clearTimeout(holdTimer);
    resumeStory();
  }, {passive:true});

  vp.addEventListener('mousedown', function() {
    holdTimer = setTimeout(pauseStory, 200);
    showCounter();
  });
  vp.addEventListener('mouseup', function() {
    clearTimeout(holdTimer);
    resumeStory();
  });
  vp.addEventListener('mouseleave', function() {
    clearTimeout(holdTimer);
    resumeStory();
  });

    cur = 0;

      segs[i].querySelector('.stry-fill').style.width = '0%';
