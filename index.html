<style>
:root {
  --w: #FFF;
  --bk: #1A1A1A;
  --g2: #EEE;
  --g5: #595959;
  --ss: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", sans-serif;
}
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
}
body {
  font-family: var(--ss);
  background: #000;
  color: var(--bk);
  line-height: 1.6;
  overflow-x: hidden;
  padding-bottom: 96px; /* 常設CTAとコンテンツ被り防止用の底面余白 */
}
img {
  max-width: 100%;
  height: auto;
  display: block;
}
/* ===== Stories Carousel ===== */
.stry {
  position: relative;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: #000;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}
.stry-viewport {
  position: relative;
  width: 100%;
  aspect-ratio: 9/16;
  cursor: pointer;
}
.stry-slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  will-change: opacity;
}
.stry-slide.act {
  opacity: 1;
  pointer-events: auto;
}
.stry-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
/* Progress bars */
.stry-bars {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 3px;
  padding: 10px 8px 0;
  z-index: 10;
}
.stry-seg {
  flex: 1;
  height: 2px;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 1px;
  overflow: hidden;
}
.stry-fill {
  width: 0%;
  height: 100%;
  background: #fff;
  border-radius: 1px;
  will-change: width;
}
.stry-seg.done .stry-fill {
  width: 100% !important;
  transition: none;
}
.stry-seg.active .stry-fill {
  transition: width linear;
}
/* ===== Stories Counter ===== */
.stry-counter {
  position: absolute;
  top: 24px;
  right: 16px;
  z-index: 11;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--ss);
  padding: 4px 10px;
  border-radius: 12px;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.stry-counter.vis {
  opacity: 1;
}
/* ===== Sticky CTA ===== */
.stry-sticky-cta {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  z-index: 999;
  background: rgba(255, 255, 255, 0.97);
  border-top: .5px solid var(--g2);
  box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.06);
  padding: 16px 20px calc(16px + env(safe-area-inset-bottom, 0px));
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  /* 初期状態（最後のページ以外）は非表示にするための設定を追加 */
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
/* 最後のページで付与するアクティブ用のクラスを追加 */
.stry-sticky-cta.act {
  opacity: 1;
  pointer-events: auto;
}
.stry-sticky-btn {
  display: block;
  width: 100%;
  padding: 16px;
  background: var(--bk);
  color: #fff;
  text-align: center;
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.1em;
  border-radius: 30px;
  text-transform: uppercase;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease;
  position: relative;
  overflow: hidden;
}
.stry-sticky-btn::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
  animation: shine 3s infinite;
}
.stry-sticky-btn:hover {
  transform: scale(1.02);
  opacity: 0.95;
}
.stry-sticky-btn:active {
  transform: scale(0.98);
}
@keyframes shine {
  0% { left: -100%; }
  25% { left: 150%; }
  100% { left: 150%; }
}
</style>

<script>
(function(){
  'use strict';

  /* ==========================================================================
     ★ 訴求別の画像切り替え管理リスト (5枚構成用)
     ※ CanvaからShopifyにアップロードした新しい画像URLをここに順に当てはめてください。
     ========================================================================== */
  var IMAGE_SETS = {
    'review': [
      'https://cdn.shopify.com/s/files/1/0957/4570/4304/files/7.webp?v=1781782959', // レビュー訴求：1枚目
      'https://cdn.shopify.com/s/files/1/0957/4570/4304/files/8.webp?v=1781786146', // レビュー訴求：2枚目
      'https://cdn.shopify.com/s/files/1/0957/4570/4304/files/9.webp?v=1781786146', // レビュー訴求：3枚目
      'https://cdn.shopify.com/s/files/1/0957/4570/4304/files/7a9c70c2d2b61ad4aa8fb3874449fc95.webp?v=1781786146', // レビュー訴求：4枚目
      'https://cdn.shopify.com/s/files/1/0957/4570/4304/files/e0a736a28e56c3ede41ffd338562d29a.webp?v=1781786146'  // レビュー訴求：5枚目
    ],
    'scent': [
      'https://cdn.shopify.com/s/files/1/0957/4570/4304/files/2026-06-18T204201.639.webp?v=1781782959#', // 香り訴求：1枚目（仮のままにしています。適宜差し替えてください）
      'https://cdn.shopify.com/s/files/1/0957/4570/4304/files/a623775fe3307521a22dca82a540a788.webp?v=1781831342#', // 香り訴求：2枚目
      'https://cdn.shopify.com/s/files/1/0957/4570/4304/files/86677ce12a04db54ad6087ce6b691b87.webp?v=1781831342#', // 香り訴求：3枚目
      'https://cdn.shopify.com/s/files/1/0957/4570/4304/files/4c171a5da5531d60d32a337c8e8b031b.webp?v=1781831343#', // 香り訴求：4枚目
      'https://cdn.shopify.com/s/files/1/0957/4570/4304/files/10ml_05ecb809-e523-4517-abf0-8257702a794a.webp?v=1781831343#'  // 香り訴求：5枚目
    ],
    'risk': [
      'https://cdn.shopify.com/s/files/1/0957/4570/4304/files/2026-06-18T204211.464.webp?v=1781782958#', // 失敗回避訴求：1枚目
      'https://cdn.shopify.com/s/files/1/0957/4570/4304/files/21d24ebaa4d1637f98ee5a248e77f64f.webp?v=1781835147#', // 失敗回避訴求：2枚目
      'https://cdn.shopify.com/s/files/1/0957/4570/4304/files/c93e524e62877edb65c0f5f916526eb0.webp?v=1781835147#', // 失敗回避訴求：3枚目
      'https://cdn.shopify.com/s/files/1/0957/4570/4304/files/45166413235ba5343565197eb4cd1076.webp?v=1781835146#', // 失敗回避訴求：4枚目
      'https://cdn.shopify.com/s/files/1/0957/4570/4304/files/1_a6c99854-df30-4dd1-83a1-673604f94ac5.webp?v=1781835147#'  // 失敗回避訴求：5枚目
    ]
  };

  /* ===== URLパラメータのチェックと自動実行処理 ===== */
  (function applyDynamicContent() {
    var urlParams = new URLSearchParams(window.location.search);
    var testParam = urlParams.get('test'); // 'review', 'scent', 'risk' などを取得

    if (testParam) {
      // 1. 画像の差し替えを実行
      if (IMAGE_SETS[testParam]) {
        var targetImages = IMAGE_SETS[testParam];
        var slideImages = document.querySelectorAll('.stry-slide img');
        for (var i = 0; i < slideImages.length; i++) {
          if (targetImages[i]) {
            slideImages[i].src = targetImages[i];
          }
        }
      }
      // 2. CTAのリンク先URLにもパラメータを引き継がせる
      var ctaLinkEl = document.getElementById('stry-cta-link');
      if (ctaLinkEl) {
        var currentHref = ctaLinkEl.getAttribute('href');
        // すでに?がついているか確認して結合
        if (currentHref) {
          var separator = currentHref.indexOf('?') !== -1 ? '&' : '?';
          ctaLinkEl.setAttribute('href', currentHref + separator + 'test=' + testParam);
        }
      }
    }
  })();

  /* ===== Stories Carousel ===== */
  var DURATION = 5000;
  var slides = document.querySelectorAll('.stry-slide');
  var segs = document.querySelectorAll('.stry-seg');
  var total = slides.length;
  var cur = 0, timer = null, paused = false, startTime = 0, elapsed = 0;
  // Counter elements and timer
  var counterEl = document.getElementById('stry-counter');
  var counterTimer = null;
  // 常設CTAボタン要素を取得
  var stickyCtaEl = document.getElementById('stry-sticky-cta');

  // CTAボタンの表示状態をチェックする関数を追加
  function checkCtaVisibility() {
    if (!stickyCtaEl) return;
    if (cur === total - 1) {
      stickyCtaEl.classList.add('act'); // 最後のページなら表示
    } else {
      stickyCtaEl.classList.remove('act'); // それ以外は非表示
    }
  }

  function showCounter() {
    if (!counterEl) return;
    counterEl.textContent = (cur + 1) + ' / ' + total;
    counterEl.classList.add('vis');
      
    clearTimeout(counterTimer);
    counterTimer = setTimeout(function() {
      counterEl.classList.remove('vis');
    }, 3000); // 3秒後にフェードアウト
  }

  // GA4へページの切り替えを通知する関数を追加
  function trackSlideView(slideIndex) {
    console.log('slide fired:', slideIndex);
    if (typeof gtag === 'function') {
      gtag('event', 'slide_' + slideIndex);
    }
  }

  function goTo(n) {
    slides[cur].classList.remove('act');
    segs[cur].classList.remove('active');
    segs[cur].classList.add('done');
    segs[cur].querySelector('.stry-fill').style.width = '100%';
    cur = n;
    if (cur >= total) { cur = 0; resetAllBars(); }
    if (cur < 0) cur = total - 1;
    // Mark previous as done, future as empty
    for (var i = 0; i < total; i++) {
      if (i < cur) { segs[i].classList.add('done'); segs[i].classList.remove('active'); segs[i].querySelector('.stry-fill').style.width = '100%'; }
      else if (i > cur) { segs[i].classList.remove('done','active'); segs[i].querySelector('.stry-fill').style.width = '0%'; }
    }
    slides[cur].classList.add('act');
    segs[cur].classList.remove('done');
    segs[cur].classList.add('active');
    elapsed = 0;
    startFill();
    showCounter(); // 遷移時にカウンターを表示
    checkCtaVisibility(); // ページ遷移時にCTAの表示をチェック
    trackSlideView(cur + 1); // ★遷移したタイミングでGA4に計測データを送る
  }
  function resetAllBars() {
    for (var i = 0; i < total; i++) {
      segs[i].classList.remove('done','active');
      segs[i].querySelector('.stry-fill').style.width = '0%';
      segs[i].querySelector('.stry-fill').style.transition = 'none';
    }
  }
  function startFill() {
    clearTimeout(timer);
    var fill = segs[cur].querySelector('.stry-fill');
    var remain = DURATION - elapsed;
    fill.style.transition = 'none';
    fill.style.width = (elapsed / DURATION * 100) + '%';
    // Force reflow then animate
    void fill.offsetWidth;
    fill.style.transition = 'width ' + remain + 'ms linear';
    fill.style.width = '100%';
    startTime = Date.now();
    timer = setTimeout(function() { goTo(cur + 1); }, remain);
  }
  function pauseStory() {
    if (paused) return;
    paused = true;
    clearTimeout(timer);
    elapsed += Date.now() - startTime;
    var fill = segs[cur].querySelector('.stry-fill');
    var computed = getComputedStyle(fill).width;
    fill.style.transition = 'none';
    fill.style.width = computed;
  }
  function resumeStory() {
    if (!paused) return;
    paused = false;
    startFill();
  }
  var startX = 0, startY = 0;
  var isSwipeAction = false;
  var preventClick = false;
  var vp = document.getElementById('stry-vp');
  var holdTimer = null;
  // 超広範囲タップ判定処理
  function handleTap(clientX) {
    if (!vp) return;
    var rect = vp.getBoundingClientRect();
    var x = clientX - rect.left;
    var width = rect.width;
    var ratio = x / width;
    if (ratio < 0.3) {
      goTo(cur - 1); // 左側30%未満なら戻る
    } else {
      goTo(cur + 1); // それ以外（右側70%）は進む
    }
  }
  // PC等のクリック用
  vp.addEventListener('click', function(e) {
    e.preventDefault();
    if (preventClick) return;
    handleTap(e.clientX);
  });
  // Touch handlers (Long-press & Swipe)
  vp.addEventListener('touchstart', function(e) {
    var touch = e.touches[0];
    startX = touch.clientX;
    startY = touch.clientY;
    isSwipeAction = false;
      
    holdTimer = setTimeout(pauseStory, 200);
    showCounter(); // 操作時にカウンター表示
  }, {passive:true});
  vp.addEventListener('touchmove', function(e) {
    if (e.touches.length > 1) return;
    var touch = e.touches[0];
    var diffX = touch.clientX - startX;
    var diffY = touch.clientY - startY;
    // 横方向の動きが縦方向より大きく、一定のしきい値を超える場合
    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 10) {
      isSwipeAction = true;
      clearTimeout(holdTimer);
      pauseStory(); // スワイプ中は自動進行を一時停止
      
      // 縦スクロールを防止
      if (e.cancelable) e.preventDefault();
    }
  }, {passive:false});
  vp.addEventListener('touchend', function(e) {
    clearTimeout(holdTimer);
      
    if (isSwipeAction) {
      var touch = e.changedTouches[0];
      var diffX = touch.clientX - startX;
      if (diffX < -50) {
        goTo(cur + 1); // 左スワイプ：次へ
      } else if (diffX > 50) {
        goTo(cur - 1); // 右スワイプ：前へ
      } else {
        resumeStory(); // しきい値未満は再開
      }
      // クリックの誤発火を防ぐ
      preventClick = true;
      setTimeout(function() { preventClick = false; }, 300);
    } else {
      resumeStory(); // 通常タップ時は長押し解除で再開
      var touch = e.changedTouches[0];
      handleTap(touch.clientX);
      preventClick = true;
      setTimeout(function() { preventClick = false; }, 300);
    }
  }, {passive:true});
  vp.addEventListener('touchcancel', function() {
    clearTimeout(holdTimer);
    resumeStory();
  }, {passive:true});
  // Long-press pause (mouse)
  vp.addEventListener('mousedown', function() {
    holdTimer = setTimeout(pauseStory, 200);
    showCounter(); // 操作時にカウンター表示
  });
  vp.addEventListener('mouseup', function() {
    clearTimeout(holdTimer);
    resumeStory();
  });
  vp.addEventListener('mouseleave', function() {
    clearTimeout(holdTimer);
    resumeStory();
  });
  // Init first slide — goToを使わず安全に初期状態を確定させる
  // HTMLで1枚目に.actが付いているため、JSは状態変数とプログレスバーのみ初期化
  (function initFirstSlide() {
    cur = 0;
    elapsed = 0;
    // 全バーをリセット
    for (var i = 0; i < total; i++) {
      segs[i].classList.remove('done', 'active');
      segs[i].querySelector('.stry-fill').style.width = '0%';
      segs[i].querySelector('.stry-fill').style.transition = 'none';
    }
    // 全スライドを非表示にしてから1枚目だけ表示
    for (var j = 0; j < total; j++) {
      slides[j].classList.remove('act');
    }
    slides[0].classList.add('act');
    segs[0].classList.add('active');
    // ページが最初からvisibleなら即座にタイマー開始、hiddenなら待機
    if (!document.hidden) {
      startFill();
    }
    showCounter();
    checkCtaVisibility(); // 初回読み込み時にもCTAの非表示状態を適用
    trackSlideView(1); // ★最初の1枚目に着地したデータをGA4へ送信
  })();
  /* ===== Page Visibility API ===== */
  // ページが非表示（バックグラウンド、画面OFF等）になったらタイマーを完全停止
  // ページが再表示されたら elapsed=0 でタイマーを最初からリスタート
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      // --- ページが非表示になった ---
      clearTimeout(timer);
      timer = null;
      // プログレスバーのアニメーションも止める
      var fill = segs[cur].querySelector('.stry-fill');
      var computed = getComputedStyle(fill).width;
      fill.style.transition = 'none';
      fill.style.width = computed;
      // paused フラグは立てない（Visibility制御はpauseStory/resumeStoryと独立管理）
    } else {
      // --- ページが再表示された ---
      elapsed = 0; // 0からリスタート
      if (!paused) {
        startFill();
      }
    }
  });

</script>
