<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oud Stallion | PURELAYER</title>
<meta name="description" content="つけた瞬間、褒められる清潔感。石鹸系の香りが一日中続く。累計12,000本突破。¥3,980からお試し。">
<style>
:root {
  --w: #FFF;
  --bk: #1A1A1A;
  --g2: #EEE;
  --g5: #595959;
  --ss: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", sans-serif;
}
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
}
body {
  font-family: var(--ss);
  background: #000;
  color: var(--bk);
  line-height: 1.6;
  overflow-x: hidden;
  padding-bottom: 96px; /* 常設CTAとコンテンツ被り防止用の底面余白 */
}
img {
  max-width: 100%;
  height: auto;
  display: block;
}
/* ===== Stories Carousel ===== */
.stry {
  position: relative;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: #000;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}
.stry-viewport {
  position: relative;
  width: 100%;
  aspect-ratio: 9/16;
  cursor: pointer;
}
.stry-slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  will-change: opacity;
}
.stry-slide.act {
  opacity: 1;
  pointer-events: auto;
}
.stry-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
/* Progress bars */
.stry-bars {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 3px;
  padding: 10px 8px 0;
  z-index: 10;
}
.stry-seg {
  flex: 1;
  height: 2px;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 1px;
  overflow: hidden;
}
.stry-fill {
  width: 0%;
  height: 100%;
  background: #fff;
  border-radius: 1px;
  will-change: width;
}
.stry-seg.done .stry-fill {
  width: 100% !important;
  transition: none;
}
.stry-seg.active .stry-fill {
  transition: width linear;
}
/* ===== Stories Counter ===== */
.stry-counter {
  position: absolute;
  top: 24px;
  right: 16px;
  z-index: 11;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--ss);
  padding: 4px 10px;
  border-radius: 12px;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.stry-counter.vis {
  opacity: 1;
}
/* ===== Sticky CTA ===== */
.stry-sticky-cta {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  z-index: 999;
  background: rgba(255, 255, 255, 0.97);
  border-top: .5px solid var(--g2);
  box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.06);
  padding: 16px 20px calc(16px + env(safe-area-inset-bottom, 0px));
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.stry-sticky-btn {
  display: block;
  width: 100%;
  padding: 16px;
  background: var(--bk);
  color: #fff;
  text-align: center;
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.1em;
  border-radius: 30px;
  text-transform: uppercase;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease;
  position: relative;
  overflow: hidden;
}
.stry-sticky-btn::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
  animation: shine 3s infinite;
}
.stry-sticky-btn:hover {
  transform: scale(1.02);
  opacity: 0.95;
}
.stry-sticky-btn:active {
  transform: scale(0.98);
}
@keyframes shine {
  0% { left: -100%; }
  25% { left: 150%; }
  100% { left: 150%; }
}
</style>
</head>
<body>
<!-- ===== STORIES CAROUSEL ===== -->
<section class="stry" id="stry">
  <div class="stry-bars" id="stry-bars">
    <div class="stry-seg active"><div class="stry-fill"></div></div>
    <div class="stry-seg"><div class="stry-fill"></div></div>
    <div class="stry-seg"><div class="stry-fill"></div></div>
    <div class="stry-seg"><div class="stry-fill"></div></div>
    <div class="stry-seg"><div class="stry-fill"></div></div>
    <div class="stry-seg"><div class="stry-fill"></div></div>
  </div>
  <!-- 右上ページカウンター -->
  <div class="stry-counter" id="stry-counter">1 / 6</div>
  <div class="stry-viewport" id="stry-vp">
    <!-- ここにCanvaの画像URLを挿入 (1枚目) -->
    <div class="stry-slide act"><img src="https://cdn.shopify.com/s/files/1/0957/4570/4304/files/32802bb22ef0a482.webp?v=1780971186#" alt="LP 1" loading="eager" width="375" height="667"></div>
    <!-- ここにCanvaの画像URLを挿入 (2枚目) -->
    <div class="stry-slide"><img src="https://cdn.shopify.com/s/files/1/0957/4570/4304/files/23.webp?v=1778635353#" alt="LP 2" loading="lazy" width="375" height="667"></div>
    <!-- ここにCanvaの画像URLを挿入 (3枚目) -->
    <div class="stry-slide"><img src="https://cdn.shopify.com/s/files/1/0957/4570/4304/files/3._1_26d6c469-04ad-4b7e-826b-dfa19b1e2d01.webp?v=1778635353#" alt="LP 3" loading="lazy" width="375" height="667"></div>
    <!-- ここにCanvaの画像URLを挿入 (4枚目) -->
    <div class="stry-slide"><img src="https://cdn.shopify.com/s/files/1/0957/4570/4304/files/2._1.webp?v=1778635353#" alt="LP 4" loading="lazy" width="375" height="667"></div>
    <!-- ここにCanvaの画像URLを挿入 (5枚目) -->
    <div class="stry-slide"><img src="https://cdn.shopify.com/s/files/1/0957/4570/4304/files/3._1.webp?v=1778635353#" alt="LP 5" loading="lazy" width="375" height="667"></div>
    <!-- ここにCanvaの画像URLを挿入 (6枚目) -->
    <div class="stry-slide"><img src="https://cdn.shopify.com/s/files/1/0957/4570/4304/files/4..webp?v=1778635594#" alt="LP 6" loading="lazy" width="375" height="667"></div>
  </div>
</section>
<!-- ===== STICKY CTA ===== -->
<div class="stry-sticky-cta" id="stry-sticky-cta">
  <a href="https://ec2ef467.purelayer-pdp.pages.dev/" class="stry-sticky-btn">公式ストアはここから！</a>
</div>
<script>
(function(){
  'use strict';
  /* ===== Stories Carousel ===== */
  var DURATION = 5000;
  var slides = document.querySelectorAll('.stry-slide');
  var segs = document.querySelectorAll('.stry-seg');
  var total = slides.length;
  var cur = 0, timer = null, paused = false, startTime = 0, elapsed = 0;
  // Counter elements and timer
  var counterEl = document.getElementById('stry-counter');
  var counterTimer = null;
  function showCounter() {
    if (!counterEl) return;
    counterEl.textContent = (cur + 1) + ' / ' + total;
    counterEl.classList.add('vis');
    
    clearTimeout(counterTimer);
    counterTimer = setTimeout(function() {
      counterEl.classList.remove('vis');
    }, 3000); // 3秒後にフェードアウト
  }
  function goTo(n) {
    slides[cur].classList.remove('act');
    segs[cur].classList.remove('active');
    segs[cur].classList.add('done');
    segs[cur].querySelector('.stry-fill').style.width = '100%';
    cur = n;
    if (cur >= total) { cur = 0; resetAllBars(); }
    if (cur < 0) cur = total - 1;
    // Mark previous as done, future as empty
    for (var i = 0; i < total; i++) {
      if (i < cur) { segs[i].classList.add('done'); segs[i].classList.remove('active'); segs[i].querySelector('.stry-fill').style.width = '100%'; }
      else if (i > cur) { segs[i].classList.remove('done','active'); segs[i].querySelector('.stry-fill').style.width = '0%'; }
    }
    slides[cur].classList.add('act');
    segs[cur].classList.remove('done');
    segs[cur].classList.add('active');
    elapsed = 0;
    startFill();
    showCounter(); // 遷移時にカウンターを表示
  }
  function resetAllBars() {
    for (var i = 0; i < total; i++) {
      segs[i].classList.remove('done','active');
      segs[i].querySelector('.stry-fill').style.width = '0%';
      segs[i].querySelector('.stry-fill').style.transition = 'none';
    }
  }
  function startFill() {
    clearTimeout(timer);
    var fill = segs[cur].querySelector('.stry-fill');
    var remain = DURATION - elapsed;
    fill.style.transition = 'none';
    fill.style.width = (elapsed / DURATION * 100) + '%';
    // Force reflow then animate
    void fill.offsetWidth;
    fill.style.transition = 'width ' + remain + 'ms linear';
    fill.style.width = '100%';
    startTime = Date.now();
    timer = setTimeout(function() { goTo(cur + 1); }, remain);
  }
  function pauseStory() {
    if (paused) return;
    paused = true;
    clearTimeout(timer);
    elapsed += Date.now() - startTime;
    var fill = segs[cur].querySelector('.stry-fill');
    var computed = getComputedStyle(fill).width;
    fill.style.transition = 'none';
    fill.style.width = computed;
  }
  function resumeStory() {
    if (!paused) return;
    paused = false;
    startFill();
  }
  var startX = 0, startY = 0;
  var isSwipeAction = false;
  var preventClick = false;
  var vp = document.getElementById('stry-vp');
  var holdTimer = null;
  // 超広範囲タップ判定処理
  function handleTap(clientX) {
    if (!vp) return;
    var rect = vp.getBoundingClientRect();
    var x = clientX - rect.left;
    var width = rect.width;
    var ratio = x / width;
    if (ratio < 0.3) {
      goTo(cur - 1); // 左側30%未満なら戻る
    } else {
      goTo(cur + 1); // それ以外（右側70%）は進む
    }
  }
  // PC等のクリック用
  vp.addEventListener('click', function(e) {
    e.preventDefault();
    if (preventClick) return;
    handleTap(e.clientX);
  });
  // Touch handlers (Long-press & Swipe)
  vp.addEventListener('touchstart', function(e) {
    var touch = e.touches[0];
    startX = touch.clientX;
    startY = touch.clientY;
    isSwipeAction = false;
    
    holdTimer = setTimeout(pauseStory, 200);
    showCounter(); // 操作時にカウンター表示
  }, {passive:true});
  vp.addEventListener('touchmove', function(e) {
    if (e.touches.length > 1) return;
    var touch = e.touches[0];
    var diffX = touch.clientX - startX;
    var diffY = touch.clientY - startY;
    // 横方向の動きが縦方向より大きく、一定のしきい値を超える場合
    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 10) {
      isSwipeAction = true;
      clearTimeout(holdTimer);
      pauseStory(); // スワイプ中は自動進行を一時停止
      
      // 縦スクロールを防止
      if (e.cancelable) e.preventDefault();
    }
  }, {passive:false});
  vp.addEventListener('touchend', function(e) {
    clearTimeout(holdTimer);
    
    if (isSwipeAction) {
      var touch = e.changedTouches[0];
      var diffX = touch.clientX - startX;
      if (diffX < -50) {
        goTo(cur + 1); // 左スワイプ：次へ
      } else if (diffX > 50) {
        goTo(cur - 1); // 右スワイプ：前へ
      } else {
        resumeStory(); // しきい値未満は再開
      }
      // クリックの誤発火を防ぐ
      preventClick = true;
      setTimeout(function() { preventClick = false; }, 300);
    } else {
      resumeStory(); // 通常タップ時は長押し解除で再開
      var touch = e.changedTouches[0];
      handleTap(touch.clientX);
      preventClick = true;
      setTimeout(function() { preventClick = false; }, 300);
    }
  }, {passive:true});
  vp.addEventListener('touchcancel', function() {
    clearTimeout(holdTimer);
    resumeStory();
  }, {passive:true});
  // Long-press pause (mouse)
  vp.addEventListener('mousedown', function() {
    holdTimer = setTimeout(pauseStory, 200);
    showCounter(); // 操作時にカウンター表示
  });
  vp.addEventListener('mouseup', function() {
    clearTimeout(holdTimer);
    resumeStory();
  });
  vp.addEventListener('mouseleave', function() {
    clearTimeout(holdTimer);
    resumeStory();
  });
  // Init first slide
  goTo(0);
  /* ===== 3rd-party Lazy Load ===== */
  var lzt=false;

  window.addEventListener('scroll',ld3rd,{once:true,passive:true});window.addEventListener('mousemove',ld3rd,{once:true,passive:true});window.addEventListener('touchstart',ld3rd,{once:true,passive:true});setTimeout(ld3rd,5000);
})();
</script>
</body>
</html>
